services:
  - type: web
    name: sydney-tv-guide
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/trending
    autoDeploy: true
    envVars:
      - key: JAVA_OPTS
        value: "-XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError"
      # Uncomment the three blocks below (and the databases: section) to
      # persist the stop-word list in Render's managed Postgres. Leaving
      # them commented keeps the default embedded H2 datasource, so the
      # app still runs on the free plan.
      # - key: SPRING_DATASOURCE_URL
      #   fromDatabase:
      #     name: newscloud-db
      #     property: connectionString
      # - key: SPRING_DATASOURCE_USERNAME
      #   fromDatabase:
      #     name: newscloud-db
      #     property: user
      # - key: SPRING_DATASOURCE_PASSWORD
      #   fromDatabase:
      #     name: newscloud-db
      #     property: password
      # - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
      #   value: org.postgresql.Driver

