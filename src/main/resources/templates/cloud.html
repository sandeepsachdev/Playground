<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta name="theme-color" content="#0b1020"/>
    <title>News Word Cloud</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
</head>
<body>
<header>
    <h1>News Word Cloud</h1>
    <div class="meta">
        <span th:if="${snapshot.articleCount > 0}">
            <strong th:text="${snapshot.articleCount}">0</strong> articles
            across
            <strong th:text="${#lists.size(snapshot.sources)}">0</strong> sources
            · last refreshed
            <time id="last-refreshed" th:attr="data-ts=${snapshot.generatedAt.toEpochMilli()}">--:--</time>
        </span>
        <span th:if="${snapshot.articleCount == 0}" class="warn">
            No articles loaded yet — check <code>newscloud.feeds</code> configuration.
        </span>
    </div>
</header>

<main class="hide-top">
    <div class="cloud-wrap">
        <button type="button" id="toggle-top" class="toggle-top" aria-pressed="false"
                aria-controls="top-list">Show top words</button>
        <div id="source-label" class="source-label" aria-live="polite">&nbsp;</div>
        <div id="cloud" role="img" aria-label="Trending word cloud"></div>
    </div>

    <aside class="top-list" id="top-list" th:if="${not #lists.isEmpty(snapshot.words)}">
        <h2>Top 25</h2>
        <ol>
            <li th:each="w, iter : ${snapshot.words}" th:if="${iter.index < 25}">
                <span class="rank" th:text="${iter.count}">1</span>
                <span class="term" th:text="${w.text}">word</span>
                <span class="count" th:text="${w.count}">0</span>
                <span class="badge" th:if="${w.phrase}">phrase</span>
                <button type="button" class="exclude" title="Exclude this word from the cloud"
                        th:attr="data-term=${w.text},data-phrase=${w.phrase}">Exclude</button>
            </li>
        </ol>
    </aside>
</main>

<footer>
    <p>
        Powered by <a href="https://rometools.github.io/rome/">Rome</a> for feed parsing and
        <a href="https://github.com/timdream/wordcloud2.js">wordcloud2.js</a> for the cloud rendering.
    </p>
</footer>

<dialog id="article-dialog" aria-labelledby="article-dialog-title">
    <div class="dialog-header">
        <h2 id="article-dialog-title">Articles mentioning <span class="term-chip">…</span></h2>
        <button type="button" class="close" aria-label="Close">✕</button>
    </div>
    <ul class="article-list"></ul>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.min.js"></script>
<script th:src="@{/js/cloud.js}"></script>
<script>
  const el = document.getElementById('last-refreshed');
  if (el && el.dataset.ts) {
    el.textContent = new Date(+el.dataset.ts).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
  }
</script>
</body>
</html>
