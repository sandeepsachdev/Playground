spring.application.name=news-wordcloud
server.port=8080

spring.thymeleaf.cache=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Default datasource: H2 file persisted under /tmp.
# On Render (or any host), override with environment variables using
# UPPERCASE_UNDERSCORE names — Spring Boot does NOT pick up dot.separated names.
# Example Render env vars for Postgres:
#   SPRING_DATASOURCE_URL      = jdbc:postgresql://host:5432/dbname?sslmode=require
#   SPRING_DATASOURCE_USERNAME = myuser
#   SPRING_DATASOURCE_PASSWORD = secret
# Do NOT name the variable "spring.datasource.url" — use the uppercase form above.
spring.datasource.url=jdbc:h2:file:/tmp/newscloud/newscloud;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Uncomment the two lines below when diagnosing datasource connection failures.
# Remove before committing.
#logging.level.com.zaxxer.hikari=DEBUG
#logging.level.org.postgresql=TRACE

newscloud.refresh-interval=PT15M
newscloud.max-entries=500
newscloud.min-token-length=3
newscloud.top-n=120
newscloud.include-phrases=true

