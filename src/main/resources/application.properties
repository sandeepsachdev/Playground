spring.application.name=news-wordcloud
server.port=8080

spring.thymeleaf.cache=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Default datasource: embedded H2 persisted under /tmp so the container
# user always has a writable location and restarts keep the accumulated
# stop-word list for the life of the container. Override on Render by
# setting SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME /
# SPRING_DATASOURCE_PASSWORD (or SPRING_DATASOURCE_DRIVER_CLASS_NAME) to
# point at a managed Postgres instance.
#spring.datasource.url=jdbc:h2:file:/tmp/newscloud/newscloud;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

newscloud.refresh-interval=PT15M
newscloud.max-entries=500
newscloud.min-token-length=3
newscloud.top-n=120
newscloud.include-phrases=true

newscloud.feeds[0].name=ABC News (Australia)
newscloud.feeds[0].url=https://www.abc.net.au/news/feed/51120/rss.xml

newscloud.feeds[1].name=BBC World
newscloud.feeds[1].url=https://feeds.bbci.co.uk/news/world/rss.xml

newscloud.feeds[2].name=The Guardian (Australia)
newscloud.feeds[2].url=https://www.theguardian.com/australia-news/rss

newscloud.feeds[3].name=Sydney Morning Herald
newscloud.feeds[3].url=https://www.smh.com.au/rss/feed.xml

newscloud.feeds[4].name=NPR News
newscloud.feeds[4].url=https://feeds.npr.org/1001/rss.xml

newscloud.feeds[5].name=Al Jazeera
newscloud.feeds[5].url=https://www.aljazeera.com/xml/rss/all.xml
