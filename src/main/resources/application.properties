spring.application.name=sydney-tv-guide
server.port=8080

spring.thymeleaf.cache=false
spring.jackson.serialization.write-dates-as-timestamps=false

spring.mvc.format.time=HH:mm
spring.mvc.format.date=yyyy-MM-dd

# Live EPG feed (XMLTV). Without this the guide renders an explicit empty state.
# Example uses iptv-org's community-scraped Freeview Australia guide.
#tvguide.epg.xmltv-url=https://iptv-org.github.io/epg/guides/au/freeview.com.au.epg.xml.gz
#tvguide.epg.refresh-interval=PT6H
