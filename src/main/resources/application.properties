spring.application.name=sydney-tv-guide
server.port=8080

spring.thymeleaf.cache=false
spring.jackson.serialization.write-dates-as-timestamps=false

spring.mvc.format.time=HH:mm

# EPG source: "static" (bundled sample) or "xmltv" (live feed).
tvguide.epg.source=static
tvguide.epg.refresh-interval=PT6H

# Uncomment and point at any XMLTV feed (iptv-org, IceTV, OzTivo, your own grabber, ...)
# The channel mapping below matches iptv-org's freeview.com.au guide ids.
#tvguide.epg.source=xmltv
#tvguide.epg.xmltv-url=https://iptv-org.github.io/epg/guides/au/freeview.com.au.epg.xml.gz
#tvguide.epg.channels[0].xmltv-id=abc1.abc.net.au
#tvguide.epg.channels[0].number=2
#tvguide.epg.channels[0].name=ABC TV
#tvguide.epg.channels[0].network=ABC
